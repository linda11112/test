<!DOCTYPE html>
<html>
<head>
    <title>Nhất Niệm Tiêu Dao - Web Test</title>
    <style>
        body { background: #1a1a1a; color: #d4af37; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .game-container { margin-top: 50px; border: 2px solid #d4af37; display: inline-block; padding: 30px; border-radius: 15px; background: #262626; }
        button { background: #d4af37; border: none; padding: 10px 20px; font-size: 18px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #f1c40f; }
        #loading { color: gray; font-style: italic; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>Tu Tiên Giả: <span id="charName">...</span></h1>
    <h2>Tu Vi: <span id="tuViDisplay">0</span></h2>
    <p id="loading">Đang kết nối thiên địa (Google Sheets)...</p>
    
    <button onclick="tuLuyen()">TU LUYỆN</button>
    <br><br>
    <button onclick="saveGame()" style="background:#27ae60; color:white;">LƯU VÀO GOOGLE SHEETS</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxv3sNGbmLyAIpmt84lmGVIs1dEgpgN4EFH734v341mz_JaHaEACo0imqHn8nCnKUFI/exec";
    let currentTuVi = 0;

    // 1. Tải dữ liệu từ Sheets khi mở Web
    async function loadGame() {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        document.getElementById('charName').innerText = data.name;
        document.getElementById('tuViDisplay').innerText = data.tuVi;
        currentTuVi = parseInt(data.tuVi);
        document.getElementById('loading').innerText = "Đã kết nối thành công!";
    }

    // 2. Logic Tu Luyện
    function tuLuyen() {
        currentTuVi += 10;
        document.getElementById('tuViDisplay').innerText = currentTuVi;
    }

    // 3. Lưu dữ liệu lên Sheets
    async function saveGame() {
        document.getElementById('loading').innerText = "Đang lưu...";
        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ tuVi: currentTuVi })
        });
        document.getElementById('loading').innerText = "Đã lưu vào Google Sheets!";
    }

    loadGame();
</script>

</body>
</html>
